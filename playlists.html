<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Playlists Gallery</title>
  <link rel="icon" type="image/png" href="logo.png">

  <!-- Same fonts as contacts.html -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Comfortaa:wght@500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --pink: #B00B55;
      --black: #0f0f0f;
      --white: #ffffff;
      --gray: #b5b5b5;
      --panel: #161616;
      --border: #242424;
      --shadowPink: 0 14px 32px rgba(176, 11, 85, 0.22);
      --radius: 14px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at top, #1b1b1b, var(--black));
      color: var(--white);
    }

    .page {
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
      padding: 4rem 3rem;
    }

    /* HEADER (matches contacts vibe) */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 2.25rem;
    }

    h1 {
      font-family: 'Comfortaa', sans-serif;
      font-size: 2.3rem;
      font-weight: 600;
      color: #eaeaea;
      line-height: 1.1;
    }

    .sub {
      margin-top: 0.65rem;
      color: rgba(255,255,255,0.75);
      font-size: 0.95rem;
      max-width: 60ch;
    }

    /* HOME BUTTON (same styling approach as contacts) */
    .home-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.6rem 1.1rem;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      text-decoration: none;
      color: var(--white);
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.3px;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
      white-space: nowrap;
    }

    .home-button:hover {
      transform: translateY(-2px);
      border-color: var(--pink);
      box-shadow: 0 10px 24px rgba(176, 11, 85, 0.25);
    }

    /* TOP CONTROLS */
    .controls {
      display: flex;
      gap: 0.75rem;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      margin: 1.8rem 0 1.25rem;
    }

    .search {
      flex: 1;
      min-width: 220px;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      background: #101010;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.65rem 0.85rem;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .search:focus-within {
      border-color: var(--pink);
      box-shadow: 0 0 0 2px rgba(176, 11, 85, 0.25);
    }
    .search svg { opacity: 0.8; flex: 0 0 auto; }
    .search input {
      width: 100%;
      border: none;
      outline: none;
      background: transparent;
      color: var(--white);
      font-size: 0.95rem;
      font-family: 'Inter', sans-serif;
    }
    .search input::placeholder { color: #7d7d7d; }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.6rem 0.9rem;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 999px;
      color: rgba(255,255,255,0.9);
      font-size: 0.85rem;
      user-select: none;
    }
    .pill b { color: var(--pink); font-weight: 700; }

    /* GALLERY GRID */
    .gallery {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.25rem;
      margin-top: 0.75rem;
    }

    .piece {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
      position: relative;
    }

    .piece:hover {
      border-color: var(--pink);
      box-shadow: var(--shadowPink);
      transform: translateY(-2px);
    }

    .frame {
      aspect-ratio: 1 / 1;
      width: 100%;
      background: #101010;
      position: relative;
      overflow: hidden;
    }

    .frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scale(1.02);
      filter: saturate(1.02) contrast(1.02);
    }

    .label {
      padding: 1rem 1rem 1.1rem;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.9rem;
    }

    .title {
      font-weight: 600;
      font-size: 0.98rem;
      color: rgba(255,255,255,0.92);
      line-height: 1.25;
    }

    .meta {
      margin-top: 0.35rem;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.65);
    }

    .badge {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.35rem 0.55rem;
      border-radius: 999px;
      border: 1px solid #2a2a2a;
      background: rgba(0,0,0,0.18);
      color: rgba(255,255,255,0.85);
      font-size: 0.75rem;
      letter-spacing: 0.2px;
    }

    .badge span {
      width: 7px; height: 7px; border-radius: 999px;
      background: var(--pink);
      box-shadow: 0 0 0 3px rgba(176,11,85,0.18);
    }

    /* MODAL PLAYER */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.72);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 1.25rem;
      z-index: 999;
    }

    .modal.open { display: flex; }

    .modal-card {
      width: min(920px, 100%);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 30px 90px rgba(0,0,0,0.55);
      overflow: hidden;
    }

    .modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 1rem 1.05rem;
      border-bottom: 1px solid #232323;
    }

    .modal-title {
      font-weight: 700;
      letter-spacing: 0.2px;
      color: rgba(255,255,255,0.95);
      font-size: 0.95rem;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }
    .modal-title small {
      font-weight: 500;
      color: rgba(255,255,255,0.65);
      font-size: 0.82rem;
    }

    .modal-actions {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.55rem 0.85rem;
      background: #101010;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--white);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
      white-space: nowrap;
    }

    .btn:hover {
      transform: translateY(-1px);
      border-color: var(--pink);
      box-shadow: 0 10px 24px rgba(176, 11, 85, 0.18);
    }

    .player-wrap {
      padding: 1rem;
    }

    iframe {
      width: 100%;
      height: 460px;
      border: none;
      border-radius: 12px;
      background: #0e0e0e;
    }

    footer {
      margin-top: 3.5rem;
      text-align: center;
      font-size: 0.85rem;
      color: #8a8a8a;
    }

    /* RESPONSIVE */
    @media (max-width: 980px) {
      .gallery { grid-template-columns: repeat(2, 1fr); }
      iframe { height: 420px; }
    }

    @media (max-width: 700px) {
      .page { padding: 3rem 1.25rem; }
      .header { flex-direction: column; align-items: flex-start; }
      .gallery { grid-template-columns: 1fr; }
      iframe { height: 400px; }
    }
  </style>
</head>

<body>
  <main class="page">
    <div class="header">
      <div>
        <h1>Playlist Gallery</h1>
        <p class="sub">A monthly archive.</p>
      </div>
      <a href="index.html" class="home-button">Home</a>
    </div>

    <div class="controls">
      <div class="search" title="Search by title">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M10.5 18a7.5 7.5 0 1 1 0-15 7.5 7.5 0 0 1 0 15Z" stroke="currentColor" stroke-width="2" opacity="0.9"/>
          <path d="M16.5 16.5 21 21" stroke="currentColor" stroke-width="2" stroke-linecap="round" opacity="0.9"/>
        </svg>
        <input id="q" type="text" placeholder="Search playlists (e.g., “June 2024”, “2023”, “Study”)…" />
      </div>

      <div class="pill">
        <span>Showing</span> <b id="countShown">0</b> <span>of</span> <b id="countAll">0</b>
      </div>
    </div>

    <section class="gallery" id="gallery"></section>

    <footer>© 2026</footer>
  </main>

  <!-- Modal Player -->
  <div class="modal" id="modal" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" aria-label="Spotify player">
      <div class="modal-head">
        <div class="modal-title" id="modalTitle">
          <span>Playlist</span>
          <small id="modalSub">Spotify</small>
        </div>

        <div class="modal-actions">
          <a class="btn" id="openSpotifyBtn" href="#" target="_blank" rel="noopener">Open in Spotify</a>
          <button class="btn" id="closeBtn" type="button">Close</button>
        </div>
      </div>

      <div class="player-wrap">
        <iframe
          id="player"
          title="Spotify playlist player"
          loading="lazy"
          allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
        </iframe>
      </div>
    </div>
  </div>

  <script>
    /**
     * ====== EDIT THIS LIST ======
     * Add your monthly playlists here.
     *
     * cover:   path to an image in your repo (recommended) OR a full https image URL
     * spotifyUrl: the normal share URL (open.spotify.com/playlist/....)
     * id:      playlist id only (the part after /playlist/)
     *
     * Tip: In Spotify -> Share -> Copy link to playlist.
     * Example link: https://open.spotify.com/playlist/37i9dQZF1DXcBWIGoYBM5M?si=...
     * The ID is: 37i9dQZF1DXcBWIGoYBM5M
     */
    const PLAYLISTS = [
  { title: "March 2026", cover: "covers/March2026.png", id: "6NHs6KrSKXBFmxhZHI926d" },
  { title: "February 2026", cover: "covers/February2026.png", id: "4yLj1JHWCKhp9c1BlRIdCv" },
  { title: "January 2026", cover: "covers/January2026.png", id: "0VBiWh3vHRYOGgWbbekNwn" },

  { title: "December 2025", cover: "covers/December2025.png", id: "0WgQcoUUSgMjoRyypbrgBR" },
  { title: "November 2025", cover: "covers/November2025.png", id: "778Q1Fur0CWcjXbphiFmk4" },
  { title: "October 2025", cover: "covers/October2025.png", id: "7DT7t2v7rnnpOC9N3mYQaS" },
  { title: "September 2025", cover: "covers/September2025.png", id: "78x5XvOEQA3B1dRqyxyQl9" },
  { title: "August 2025", cover: "covers/August2025.png", id: "4QHPdmkl0JZakyLzyivXRG" },
  { title: "July 2025", cover: "covers/July2025.png", id: "1DpXwpCBZ50ibyHv11fIOd" },
  { title: "June 2025", cover: "covers/June2025.png", id: "6Kp55CaQIBbsLPMF3bkP7K" },
  { title: "May 2025", cover: "covers/May2025.png", id: "03bWsQEy2JLpPUER6MuIXm" },
  { title: "April 2025", cover: "covers/April2025.png", id: "7MNAZj06cLp7uRyGDqEIxR" },
  { title: "March 2025", cover: "covers/March2025.png", id: "31jbRI9nm98k6cQJ6uC20m" },
  { title: "February 2025", cover: "covers/February2025.png", id: "2gPQ9ciCOGUO1Q0ik5J77Z" },
  { title: "January 2025", cover: "covers/January2025.png", id: "5V6ovEUT7N4bnnAI6XMKt0" },

  { title: "December 2024", cover: "covers/December2024.png", id: "3aMuwrB8NsIvRad2EI3D2b" },
  { title: "November 2024", cover: "covers/November2024.png", id: "7BL3BESHc0rgtjP2PLsF0k" },
  { title: "October 2024", cover: "covers/October2024.png", id: "3VybIoaQQXC2zvYmRAa6ed" },
  { title: "September 2024", cover: "covers/September2024.png", id: "6DVjkqr0VUaBlmKjlAzGYL" },
  { title: "August 2024", cover: "covers/August2024.png", id: "2GH1ww0oWlqLkTYG0rXTvJ" },
  { title: "July 2024", cover: "covers/July2024.png", id: "0XQ9YY9WrsQjadZzcgRVBH" },
  { title: "June 2024", cover: "covers/June2024.png", id: "0NdQROqWuKakOGHLglhmZC" },
  { title: "May 2024", cover: "covers/May2024.png", id: "5qhS8fNjVK0Bc2zbtanUcg" },
  { title: "April 2024", cover: "covers/April2024.png", id: "7o7kbQ07bps9zmyfLoWa8q" },
  { title: "March 2024", cover: "covers/March2024.png", id: "3xTW45uy4pycmCRudq26g9" },
  { title: "February 2024", cover: "covers/February2024.png", id: "4ymaSUfcWHgZYgXLmg7VXl" },
  { title: "January 2024", cover: "covers/January2024.png", id: "2XOqIVz3mjATxvOPCnmtCx" },

  { title: "December 2023", cover: "covers/December2023.png", id: "4d9ZEHDndf1BA9h6jdCEE8" },
  { title: "November 2023", cover: "covers/November2023.png", id: "7CeS2nfxlrkLgMe25gglmD" },
  { title: "October 2023", cover: "covers/October2023.png", id: "1w4ntYYR0CiWdczibyQiIw" },
  { title: "September 2023", cover: "covers/September2023.png", id: "1kLcguuqnry52gyTIcqUbI" },
  { title: "August 2023", cover: "covers/August2023.png", id: "2DNDsCftikzcr9X7xMDCWq" },
  { title: "July 2023", cover: "covers/July2023.png", id: "7cnKiClhcD1ANxDGive17h" },
  { title: "June 2023", cover: "covers/June2023.png", id: "6dN23ULruEIq3AcJT6ngzW" },
  { title: "May 2023", cover: "covers/May2023.png", id: "7r9JZje5dxEP3n5m1zstbS" },
  { title: "April 2023", cover: "covers/April2023.png", id: "0xT9wovz8rShMGRdfFDNp5" },
  { title: "March 2023", cover: "covers/March2023.png", id: "4Qs1gWtMnrOCFS8YOgpeT8" }
];

    const gallery = document.getElementById("gallery");
    const q = document.getElementById("q");
    const countShown = document.getElementById("countShown");
    const countAll = document.getElementById("countAll");

    const modal = document.getElementById("modal");
    const closeBtn = document.getElementById("closeBtn");
    const player = document.getElementById("player");
    const modalTitle = document.getElementById("modalTitle");
    const modalSub = document.getElementById("modalSub");
    const openSpotifyBtn = document.getElementById("openSpotifyBtn");

    countAll.textContent = PLAYLISTS.length;

    function embedSrcFromId(id) {
      // Spotify Embed URL for playlists
      // You can swap theme=0/1 if you want (0 is dark)
      return "https://open.spotify.com/embed/playlist/" + encodeURIComponent(id) + "?utm_source=generator&theme=0";
    }

    function render(list) {
      gallery.innerHTML = "";

      list.forEach((p) => {
        const card = document.createElement("article");
        card.className = "piece";
        card.tabIndex = 0;

        card.innerHTML = `
          <div class="frame">
            <img src="${p.cover}" alt="${escapeHtml(p.title)} cover" loading="lazy" />
          </div>
          <div class="label">
            <div>
              <div class="title">${escapeHtml(p.title)}</div>
              <div class="meta">${escapeHtml(p.subtitle || "Spotify playlist")}</div>
            </div>
            <div class="badge" title="Tap to open player"><span></span> Play</div>
          </div>
        `;

        const open = () => openPlayer(p);
        card.addEventListener("click", open);
        card.addEventListener("keydown", (e) => {
          if (e.key === "Enter" || e.key === " ") {
            e.preventDefault();
            open();
          }
        });

        gallery.appendChild(card);
      });

      countShown.textContent = list.length;
    }

    function openPlayer(p) {
      modal.classList.add("open");
      modal.setAttribute("aria-hidden", "false");

      // Title
      modalTitle.firstElementChild.textContent = p.title;
      modalSub.textContent = p.subtitle || "Spotify";

      // Open in Spotify link
      openSpotifyBtn.href = p.spotifyUrl || ("https://open.spotify.com/playlist/" + p.id);

      // Load the embed *only when opened* (better performance)
      player.src = embedSrcFromId(p.id);

      // Close on background click
      setTimeout(() => closeBtn.focus(), 0);
    }

    function closePlayer() {
      modal.classList.remove("open");
      modal.setAttribute("aria-hidden", "true");

      // Stop playback by unloading iframe
      player.src = "";
    }

    closeBtn.addEventListener("click", closePlayer);
    modal.addEventListener("click", (e) => {
      if (e.target === modal) closePlayer();
    });

    window.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && modal.classList.contains("open")) closePlayer();
    });

    // Search
    q.addEventListener("input", () => {
      const term = q.value.trim().toLowerCase();
      if (!term) return render(PLAYLISTS);

      const filtered = PLAYLISTS.filter(p =>
        (p.title || "").toLowerCase().includes(term) ||
        (p.subtitle || "").toLowerCase().includes(term)
      );
      render(filtered);
    });

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    // Initial render
    render(PLAYLISTS);
  </script>
</body>
</html>
