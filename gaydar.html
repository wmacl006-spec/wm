<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gaydar</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #111;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .container {
    text-align: center;
  }

  .title {
    font-size: 28px;
    margin-bottom: 20px;
    opacity: 0.8;
  }

  .reading {
    font-size: 48px;
    margin-bottom: 30px;
    font-weight: bold;
  }

  button {
    width: 200px;
    height: 200px;
    border-radius: 20px;
    border: none;
    background: #222;
    color: white;
    font-size: 20px;
    box-shadow: 0 0 20px rgba(255,255,255,0.1);
    position: relative;
  }

  button:active {
    background: #444;
  }
</style>
</head>
<body>

<div class="container">
  <div class="title">GAYDAR SCANNER</div>
  <div class="reading" id="reading">0%</div>
  <button id="scanBtn">SCAN</button>
</div>

<script>
  const btn = document.getElementById("scanBtn");
  const reading = document.getElementById("reading");

  let holdInterval;
  let mode = null; // "top" or "bottom"

  function startHold(e) {
    const rect = btn.getBoundingClientRect();
    let y;

    if (e.touches) {
      y = e.touches[0].clientY;
    } else {
      y = e.clientY;
    }

    const relativeY = y - rect.top;

    // Determine if top or bottom half
    if (relativeY < rect.height / 2) {
      mode = "top";
    } else {
      mode = "bottom";
    }

    if (mode === "top") {
      reading.textContent = "0%";
    }

    holdInterval = setInterval(() => {
      if (mode === "bottom") {
        const value = Math.floor(Math.random() * (100 - 63 + 1)) + 63;
        reading.textContent = value + "%";
      }
    }, 100);
  }

  function endHold() {
    clearInterval(holdInterval);
    mode = null;
  }

  // Touch
  btn.addEventListener("touchstart", startHold);
  btn.addEventListener("touchend", endHold);

  // Mouse
  btn.addEventListener("mousedown", startHold);
  btn.addEventListener("mouseup", endHold);
</script>

</body>
</html>
