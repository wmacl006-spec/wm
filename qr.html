<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Code Maker | William MacLean</title>
<link rel="icon" href="logo.png" />
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>

<style>
:root{
  --bg:#000;
  --panel:#050505;
  --panel-2:#0a0a0a;
  --text:#fff;
  --muted:#8d8d8d;
  --line:rgba(255,255,255,0.08);
  --line-strong:rgba(255,255,255,0.14);
  --accent:#b00b55;
  --header-h:64px;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html, body{
  min-height:100%;
}

body{
  font-family:"Comfortaa",sans-serif;
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
}

header{
  position:fixed;
  inset:0 0 auto 0;
  height:var(--header-h);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 18px;
  background:rgba(0,0,0,0.72);
  backdrop-filter:blur(10px);
  border-bottom:1px solid rgba(255,255,255,0.05);
  z-index:100;
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
}

.logo img{
  width:28px;
  height:28px;
}

.logo span{
  font-size:0.95rem;
  font-weight:700;
}

nav{
  display:flex;
  gap:14px;
}

nav a{
  font-size:0.84rem;
  color:#cfcfcf;
  text-decoration:none;
  transition:0.2s;
}

nav a:hover{
  color:#fff;
}

.page{
  min-height:100vh;
  padding-top:var(--header-h);
  display:grid;
  grid-template-columns:1fr;
}

.left{
  position:relative;
  min-height:28vh;
  display:flex;
  align-items:flex-end;
  background:linear-gradient(45deg, #171717, #2b0c1a 55%, var(--accent));
  overflow:hidden;
}

.left::after{
  content:"";
  position:absolute;
  inset:0;
  opacity:0.16;
  background-image:radial-gradient(var(--accent) 0.6px, transparent 0.6px);
  background-size:20px 20px;
}

.overlay{
  position:relative;
  z-index:2;
  padding:30px 20px;
}

.overlay h1{
  font-size:clamp(2.5rem, 8vw, 4rem);
  line-height:0.9;
  letter-spacing:-0.04em;
}

.right{
  background:var(--panel);
  padding:26px 18px 32px;
  display:flex;
  justify-content:center;
}

.container{
  width:100%;
  max-width:560px;
  display:flex;
  flex-direction:column;
  gap:18px;
}

.control-group{
  display:flex;
  flex-direction:column;
  gap:8px;
}

label{
  font-size:0.74rem;
  text-transform:uppercase;
  color:var(--muted);
  letter-spacing:0.1em;
}

input[type="text"],
select{
  width:100%;
  background:var(--panel-2);
  border:1px solid var(--line);
  padding:12px 13px;
  color:#fff;
  font-family:inherit;
  border-radius:4px;
  outline:none;
}

input[type="text"]:focus,
select:focus{
  border-color:rgba(176,11,85,0.5);
}

.row-2{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.color-picker-wrapper,
.range-wrap,
.preview-box{
  background:var(--panel-2);
  border:1px solid var(--line);
}

.color-picker-wrapper{
  display:flex;
  align-items:center;
  gap:10px;
  padding:8px 10px;
  min-height:48px;
  border-radius:4px;
}

input[type="color"]{
  border:none;
  width:30px;
  height:30px;
  background:none;
  cursor:pointer;
  flex:0 0 auto;
}

.color-value{
  font-size:0.85rem;
  color:#ddd;
}

.checkbox-row{
  display:flex;
  align-items:center;
  gap:10px;
  font-size:0.85rem;
  color:#ddd;
  margin-top:2px;
}

.checkbox-row input{
  accent-color:var(--accent);
}

.range-wrap{
  padding:12px;
  border-radius:4px;
}

input[type="range"]{
  width:100%;
  accent-color:var(--accent);
}

.range-value{
  margin-top:8px;
  font-size:0.82rem;
  color:#d6d6d6;
}

.preview-box{
  margin-top:2px;
  padding:18px;
  min-height:290px;
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
  border-radius:4px;
  overflow:hidden;
}

.preview-box.transparent-preview{
  background-color:#0f0f0f;
  background-image:
    linear-gradient(45deg, rgba(255,255,255,0.05) 25%, transparent 25%),
    linear-gradient(-45deg, rgba(255,255,255,0.05) 25%, transparent 25%),
    linear-gradient(45deg, transparent 75%, rgba(255,255,255,0.05) 75%),
    linear-gradient(-45deg, transparent 75%, rgba(255,255,255,0.05) 75%);
  background-size:20px 20px;
  background-position:0 0, 0 10px, 10px -10px, -10px 0;
}

#qr-output{
  width:100%;
  display:flex;
  justify-content:center;
  align-items:center;
}

#qr-output canvas{
  display:block;
  max-width:100%;
  height:auto;
  image-rendering:pixelated;
  image-rendering:crisp-edges;
}

.actions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

button{
  border:none;
  padding:14px;
  font-family:inherit;
  font-weight:700;
  cursor:pointer;
  transition:0.2s;
  text-transform:uppercase;
  letter-spacing:0.05em;
  border-radius:4px;
}

.btn-primary{
  background:var(--accent);
  color:#fff;
}

.btn-secondary{
  background:#111;
  color:#fff;
  border:1px solid var(--line-strong);
}

button:hover{
  filter:brightness(1.1);
  transform:translateY(-1px);
}

@media (min-width:900px){
  .page{
    grid-template-columns:1fr 1.15fr;
  }

  .left,
  .right{
    min-height:calc(100vh - var(--header-h));
  }

  .right{
    padding:34px 24px;
  }

  .overlay{
    padding:40px;
  }
}

@media (max-width:680px){
  nav{
    gap:10px;
  }

  nav a{
    font-size:0.76rem;
  }

  .row-2,
  .actions{
    grid-template-columns:1fr;
  }
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <img src="logo.png" alt="Logo">
    <span>William MacLean</span>
  </div>

  <nav>
    <a href="index.html">Home</a>
    <a href="apps.html">Apps</a>
  </nav>
</header>

<div class="page">
  <section class="left">
    <div class="overlay">
      <h1>QR<br>Maker</h1>
    </div>
  </section>

  <section class="right">
    <div class="container">

      <div class="control-group">
        <label>URL or Text</label>
        <input type="text" id="qr-input" placeholder="https://..." value="https://williammaclean.ca">
      </div>

      <div class="row-2">
        <div class="control-group">
          <label>Foreground</label>
          <div class="color-picker-wrapper">
            <input type="color" id="fg-color" value="#b00b55">
            <span class="color-value" id="fg-label">#b00b55</span>
          </div>
        </div>

        <div class="control-group">
          <label>Background</label>
          <div class="color-picker-wrapper">
            <input type="color" id="bg-color" value="#ffffff">
            <span class="color-value" id="bg-label">#ffffff</span>
          </div>
          <div class="checkbox-row">
            <input type="checkbox" id="transparent-bg">
            <span>Transparent background</span>
          </div>
        </div>
      </div>

      <div class="row-2">
        <div class="control-group">
          <label>Pattern</label>
          <select id="dot-style">
            <option value="square">Block</option>
            <option value="rounded">Rounded</option>
            <option value="dots">Dots</option>
            <option value="diamond">Diamond</option>
            <option value="spark">Spark</option>
            <option value="thin">Thin</option>
          </select>
        </div>

        <div class="control-group">
          <label>Corner Eye</label>
          <select id="eye-style">
            <option value="square">Square</option>
            <option value="rounded">Rounded</option>
            <option value="extra-rounded">Soft Rounded</option>
            <option value="circle">Circle</option>
            <option value="diamond">Diamond</option>
          </select>
        </div>
      </div>

      <div class="row-2">
        <div class="control-group">
          <label>Inner Eye</label>
          <select id="eye-ball-style">
            <option value="square">Square</option>
            <option value="rounded">Rounded</option>
            <option value="circle">Circle</option>
            <option value="diamond">Diamond</option>
          </select>
        </div>

        <div class="control-group">
          <label>Error Correction</label>
          <select id="qr-level">
            <option value="L">Low</option>
            <option value="M">Medium</option>
            <option value="Q">High</option>
            <option value="H" selected>Very High</option>
          </select>
        </div>
      </div>

      <div class="control-group">
        <label>Size</label>
        <div class="range-wrap">
          <input type="range" id="size-range" min="180" max="420" step="10" value="240">
          <div class="range-value"><span id="size-value">240</span>px</div>
        </div>
      </div>

      <div class="preview-box" id="preview-box">
        <div id="qr-output"></div>
      </div>

      <div class="actions">
        <button class="btn-primary" id="download-btn">Download PNG</button>
        <button class="btn-secondary" id="reset-btn">Reset Style</button>
      </div>

    </div>
  </section>
</div>

<script>
const input = document.getElementById('qr-input');
const fgColor = document.getElementById('fg-color');
const bgColor = document.getElementById('bg-color');
const fgLabel = document.getElementById('fg-label');
const bgLabel = document.getElementById('bg-label');
const transCheck = document.getElementById('transparent-bg');
const dotStyle = document.getElementById('dot-style');
const eyeStyle = document.getElementById('eye-style');
const eyeBallStyle = document.getElementById('eye-ball-style');
const qrLevel = document.getElementById('qr-level');
const sizeRange = document.getElementById('size-range');
const sizeValue = document.getElementById('size-value');
const output = document.getElementById('qr-output');
const previewBox = document.getElementById('preview-box');
const downloadBtn = document.getElementById('download-btn');
const resetBtn = document.getElementById('reset-btn');

function roundedRect(ctx, x, y, w, h, r) {
  const radius = Math.min(r, w / 2, h / 2);
  ctx.beginPath();
  ctx.moveTo(x + radius, y);
  ctx.arcTo(x + w, y, x + w, y + h, radius);
  ctx.arcTo(x + w, y + h, x, y + h, radius);
  ctx.arcTo(x, y + h, x, y, radius);
  ctx.arcTo(x, y, x + w, y, radius);
  ctx.closePath();
}

function drawDiamond(ctx, x, y, size) {
  const half = size / 2;
  ctx.beginPath();
  ctx.moveTo(x + half, y);
  ctx.lineTo(x + size, y + half);
  ctx.lineTo(x + half, y + size);
  ctx.lineTo(x, y + half);
  ctx.closePath();
  ctx.fill();
}

function drawCircle(ctx, x, y, size) {
  ctx.beginPath();
  ctx.arc(x + size / 2, y + size / 2, size / 2, 0, Math.PI * 2);
  ctx.fill();
}

function drawShape(ctx, style, x, y, size) {
  switch (style) {
    case 'rounded':
      roundedRect(ctx, x, y, size, size, size * 0.28);
      ctx.fill();
      break;
    case 'extra-rounded':
      roundedRect(ctx, x, y, size, size, size * 0.42);
      ctx.fill();
      break;
    case 'circle':
      drawCircle(ctx, x, y, size);
      break;
    case 'diamond':
      drawDiamond(ctx, x, y, size);
      break;
    default:
      ctx.fillRect(x, y, size, size);
  }
}

function inFinder(row, col, count) {
  return (
    (row < 7 && col < 7) ||
    (row < 7 && col >= count - 7) ||
    (row >= count - 7 && col < 7)
  );
}

function shouldSkipForEyeRing(row, col, count) {
  if (!inFinder(row, col, count)) return false;

  const inTopLeftRing = row <= 6 && col <= 6 && !(row >= 1 && row <= 5 && col >= 1 && col <= 5);
  const inTopRightRing = row <= 6 && col >= count - 7 && !(row >= 1 && row <= 5 && col >= count - 6 && col <= count - 2);
  const inBottomLeftRing = row >= count - 7 && col <= 6 && !(row >= count - 6 && row <= count - 2 && col >= 1 && col <= 5);

  return inTopLeftRing || inTopRightRing || inBottomLeftRing;
}

function shouldSkipForEyeBall(row, col, count) {
  return (
    (row >= 2 && row <= 4 && col >= 2 && col <= 4) ||
    (row >= 2 && row <= 4 && col >= count - 5 && col <= count - 3) ||
    (row >= count - 5 && row <= count - 3 && col >= 2 && col <= 4)
  );
}

function drawModule(ctx, style, x, y, size) {
  switch (style) {
    case 'dots':
      drawCircle(ctx, x + size * 0.14, y + size * 0.14, size * 0.72);
      break;

    case 'rounded':
      roundedRect(ctx, x, y, size, size, size * 0.24);
      ctx.fill();
      break;

    case 'diamond':
      drawDiamond(ctx, x + size * 0.04, y + size * 0.04, size * 0.92);
      break;

    case 'spark':
      roundedRect(ctx, x + size * 0.16, y, size * 0.68, size, size * 0.16);
      ctx.fill();
      roundedRect(ctx, x, y + size * 0.16, size, size * 0.68, size * 0.16);
      ctx.fill();
      break;

    case 'thin':
      roundedRect(ctx, x + size * 0.16, y + size * 0.16, size * 0.68, size * 0.68, size * 0.1);
      ctx.fill();
      break;

    default:
      ctx.fillRect(x, y, size, size);
  }
}

function fillEyeHole(ctx, x, y, size, outerStyle, fillColor, isTransparent) {
  if (isTransparent) {
    ctx.save();
    ctx.globalCompositeOperation = 'destination-out';
    drawShape(ctx, outerStyle === 'circle' ? 'circle' : outerStyle, x, y, size);
    ctx.restore();
  } else {
    ctx.fillStyle = fillColor;
    drawShape(ctx, outerStyle === 'circle' ? 'circle' : outerStyle, x, y, size);
  }
}

function drawEye(ctx, startCol, startRow, cellSize, margin, outerStyle, innerStyle, fg, eyeGapColor, isTransparent) {
  const x = margin + startCol * cellSize;
  const y = margin + startRow * cellSize;

  ctx.fillStyle = fg;
  drawShape(ctx, outerStyle, x, y, cellSize * 7);

  fillEyeHole(ctx, x + cellSize, y + cellSize, cellSize * 5, outerStyle, eyeGapColor, isTransparent);

  ctx.fillStyle = fg;
  drawShape(ctx, innerStyle, x + cellSize * 2, y + cellSize * 2, cellSize * 3);
}

function updateColorLabels() {
  fgLabel.textContent = fgColor.value;
  bgLabel.textContent = bgColor.value;
}

function generateQR() {
  const text = input.value.trim() || ' ';
  const level = qrLevel.value;
  const requestedSize = Number(sizeRange.value);

  sizeValue.textContent = requestedSize;
  updateColorLabels();

  previewBox.classList.toggle('transparent-preview', transCheck.checked);

  const qr = qrcode(0, level);
  qr.addData(text);
  qr.make();

  const count = qr.getModuleCount();
  const quietZone = 4;
  const totalCells = count + quietZone * 2;

  const cellSize = Math.max(1, Math.floor(requestedSize / totalCells));
  const actualSize = cellSize * totalCells;
  const margin = quietZone * cellSize;

  output.innerHTML = '';

  const canvas = document.createElement('canvas');
  canvas.width = actualSize;
  canvas.height = actualSize;
  canvas.style.width = requestedSize + 'px';
  canvas.style.height = requestedSize + 'px';

  const ctx = canvas.getContext('2d', { alpha: true });
  ctx.imageSmoothingEnabled = false;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (!transCheck.checked) {
    ctx.fillStyle = bgColor.value;
    ctx.fillRect(0, 0, actualSize, actualSize);
  }

  ctx.fillStyle = fgColor.value;

  for (let row = 0; row < count; row++) {
    for (let col = 0; col < count; col++) {
      if (!qr.isDark(row, col)) continue;
      if (shouldSkipForEyeRing(row, col, count)) continue;
      if (shouldSkipForEyeBall(row, col, count)) continue;

      const x = margin + col * cellSize;
      const y = margin + row * cellSize;
      drawModule(ctx, dotStyle.value, x, y, cellSize);
    }
  }

  const eyeGapColor = bgColor.value;

  drawEye(ctx, 0, 0, cellSize, margin, eyeStyle.value, eyeBallStyle.value, fgColor.value, eyeGapColor, transCheck.checked);
  drawEye(ctx, count - 7, 0, cellSize, margin, eyeStyle.value, eyeBallStyle.value, fgColor.value, eyeGapColor, transCheck.checked);
  drawEye(ctx, 0, count - 7, cellSize, margin, eyeStyle.value, eyeBallStyle.value, fgColor.value, eyeGapColor, transCheck.checked);

  output.appendChild(canvas);
}

function downloadPNG() {
  const canvas = output.querySelector('canvas');
  if (!canvas) return;

  const exportCanvas = document.createElement('canvas');
  exportCanvas.width = canvas.width;
  exportCanvas.height = canvas.height;

  const exportCtx = exportCanvas.getContext('2d', { alpha: true });
  exportCtx.imageSmoothingEnabled = false;
  exportCtx.drawImage(canvas, 0, 0);

  const link = document.createElement('a');
  link.download = 'qrcode.png';
  link.href = exportCanvas.toDataURL('image/png');
  link.click();
}

function resetStyle() {
  input.value = 'https://williammaclean.ca';
  fgColor.value = '#b00b55';
  bgColor.value = '#ffffff';
  transCheck.checked = false;
  dotStyle.value = 'square';
  eyeStyle.value = 'square';
  eyeBallStyle.value = 'square';
  qrLevel.value = 'H';
  sizeRange.value = 240;
  generateQR();
}

[
  input,
  fgColor,
  bgColor,
  transCheck,
  dotStyle,
  eyeStyle,
  eyeBallStyle,
  qrLevel,
  sizeRange
].forEach(el => {
  el.addEventListener('input', generateQR);
  el.addEventListener('change', generateQR);
});

downloadBtn.addEventListener('click', downloadPNG);
resetBtn.addEventListener('click', resetStyle);

generateQR();
</script>

</body>
</html>
