<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>QR Code Maker | William MacLean</title>
<link rel="icon" href="logo.png" />
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>

<style>
:root{
  --bg:#000;
  --panel:#050505;
  --panel-2:#0d0d0d;
  --text:#fff;
  --muted:#8d8d8d;
  --line:rgba(255,255,255,0.08);
  --line-strong:rgba(255,255,255,0.14);
  --accent:#b00b55;
  --header-h:64px;
  --radius:18px;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:"Comfortaa",sans-serif;
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
}

header{
  position:fixed;
  inset:0 0 auto 0;
  height:var(--header-h);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 18px;
  background:rgba(0,0,0,0.78);
  backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(255,255,255,0.06);
  z-index:100;
}

.logo{display:flex;align-items:center;gap:10px}
.logo img{width:28px;height:28px}
.logo span{font-size:.95rem;font-weight:700}

nav{display:flex;gap:14px}
nav a{
  font-size:.84rem;
  color:#cfcfcf;
  text-decoration:none;
  transition:.2s;
}
nav a:hover{color:#fff}

.page{
  min-height:100vh;
  padding-top:var(--header-h);
  display:grid;
  grid-template-columns:1fr;
}

.left{
  position:relative;
  min-height:28vh;
  display:flex;
  align-items:flex-end;
  background:
    radial-gradient(circle at top right, rgba(176,11,85,.38), transparent 34%),
    linear-gradient(135deg, #121212 0%, #050505 48%, #190912 100%);
  overflow:hidden;
}

.left::before{
  content:"";
  position:absolute;
  inset:0;
  opacity:.22;
  background-image:
    radial-gradient(var(--accent) .8px, transparent .8px),
    linear-gradient(rgba(255,255,255,.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.02) 1px, transparent 1px);
  background-size:22px 22px, 22px 22px, 22px 22px;
}

.overlay{
  position:relative;
  z-index:2;
  padding:30px 20px;
}

.overlay h1{
  font-size:clamp(2.5rem, 8vw, 4.3rem);
  line-height:.9;
  letter-spacing:-.05em;
}

.right{
  background:var(--panel);
  padding:22px;
  display:flex;
  justify-content:center;
}

.container{
  width:100%;
  max-width:1080px;
  display:grid;
  gap:20px;
}

.controls,
.preview-wrap{
  background:linear-gradient(180deg, rgba(255,255,255,.018), rgba(255,255,255,.008));
  border:1px solid var(--line);
  border-radius:24px;
  box-shadow:0 18px 40px rgba(0,0,0,.26);
}

.controls{
  padding:18px;
  display:grid;
  gap:16px;
}

.group{
  display:flex;
  flex-direction:column;
  gap:8px;
}

label{
  font-size:.72rem;
  text-transform:uppercase;
  letter-spacing:.14em;
  color:var(--muted);
}

input[type="text"], select{
  width:100%;
  background:var(--panel-2);
  border:1px solid var(--line);
  color:#fff;
  border-radius:14px;
  padding:13px 14px;
  font-family:inherit;
  outline:none;
}

input[type="text"]:focus, select:focus{
  border-color:rgba(176,11,85,.55);
  box-shadow:0 0 0 3px rgba(176,11,85,.14);
}

.grid-2,.grid-3{
  display:grid;
  gap:12px;
}
.grid-2{grid-template-columns:1fr 1fr}
.grid-3{grid-template-columns:1fr 1fr 1fr}

.color-box{
  display:flex;
  align-items:center;
  gap:10px;
  min-height:50px;
  border-radius:14px;
  padding:8px 10px;
  background:var(--panel-2);
  border:1px solid var(--line);
}

.color-box span{
  font-size:.86rem;
  color:#e2e2e2;
}

input[type="color"]{
  width:34px;
  height:34px;
  border:none;
  background:none;
  cursor:pointer;
  flex:0 0 auto;
}

.small-toggle{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:.82rem;
  color:#d7d7d7;
}

.range-box{
  background:var(--panel-2);
  border:1px solid var(--line);
  border-radius:14px;
  padding:12px 14px;
}

input[type="range"]{
  width:100%;
  accent-color:var(--accent);
}

.value-note{
  margin-top:6px;
  font-size:.82rem;
  color:#d0d0d0;
}

.preview-wrap{
  padding:18px;
}

.preview-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  margin-bottom:14px;
  flex-wrap:wrap;
}

.preview-header h2{
  font-size:1rem;
}

.preview-box{
  min-height:300px;
  border-radius:22px;
  background:
    radial-gradient(circle at top left, rgba(176,11,85,.09), transparent 24%),
    #0a0a0a;
  border:1px solid var(--line);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
  overflow:hidden;
}

#qr-output{
  display:flex;
  align-items:center;
  justify-content:center;
  width:100%;
}

#qr-output canvas{
  display:block;
  max-width:100%;
  height:auto;
  image-rendering:pixelated;
  filter:drop-shadow(0 12px 28px rgba(0,0,0,.38));
}

.actions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-top:14px;
}

button{
  border:none;
  border-radius:16px;
  padding:14px 16px;
  font-family:inherit;
  font-weight:700;
  cursor:pointer;
  transition:.2s ease;
}

.btn-primary{
  background:var(--accent);
  color:#fff;
}

.btn-secondary{
  background:#121212;
  color:#fff;
  border:1px solid var(--line-strong);
}

button:hover{
  transform:translateY(-1px);
  filter:brightness(1.05);
}

@media (min-width: 920px){
  .page{grid-template-columns:1fr 1.2fr}
  .left,.right{min-height:calc(100vh - var(--header-h))}
  .right{padding:26px}
  .container{grid-template-columns:minmax(320px, 420px) 1fr;align-items:start}
  .preview-wrap{position:sticky;top:90px}
  .overlay{padding:42px}
}

@media (max-width: 640px){
  nav{gap:10px}
  nav a{font-size:.76rem}
  .grid-2,.grid-3,.actions{grid-template-columns:1fr}
  .preview-box{min-height:250px}
}
</style>
</head>
<body>
<header>
  <div class="logo">
    <img src="logo.png" alt="Logo">
    <span>William MacLean</span>
  </div>
  <nav>
    <a href="index.html">Home</a>
    <a href="tools.html">Tools</a>
    <a href="apps.html">Apps</a>
  </nav>
</header>

<div class="page">
  <section class="left">
    <div class="overlay">
      <h1>QR<br>Maker</h1>
    </div>
  </section>

  <section class="right">
    <div class="container">
      <div class="controls">
        <div class="group">
          <label>URL or Text</label>
          <input type="text" id="qr-input" placeholder="https://..." value="https://williammaclean.ca">
        </div>

        <div class="grid-2">
          <div class="group">
            <label>Foreground</label>
            <div class="color-box">
              <input type="color" id="fg-color" value="#b00b55">
              <span id="fg-label">#b00b55</span>
            </div>
          </div>
          <div class="group">
            <label>Background</label>
            <div class="color-box">
              <input type="color" id="bg-color" value="#ffffff">
              <span id="bg-label">#ffffff</span>
            </div>
          </div>
        </div>

        <div class="small-toggle">
          <input type="checkbox" id="transparent-bg">
          <span>Transparent Background</span>
        </div>

        <div class="grid-2">
          <div class="group">
            <label>Pattern</label>
            <select id="dot-style">
              <option value="square">Block</option>
              <option value="rounded">Rounded</option>
              <option value="dots">Dots</option>
              <option value="diamond">Diamond</option>
              <option value="spark">Spark</option>
              <option value="thin">Thin</option>
            </select>
          </div>
          <div class="group">
            <label>Corner Eye</label>
            <select id="eye-style">
              <option value="square">Square</option>
              <option value="rounded">Rounded</option>
              <option value="extra-rounded">Soft Rounded</option>
              <option value="circle">Circle</option>
              <option value="diamond">Diamond</option>
            </select>
          </div>
        </div>

        <div class="grid-2">
          <div class="group">
            <label>Inner Eye</label>
            <select id="eye-ball-style">
              <option value="square">Square</option>
              <option value="rounded">Rounded</option>
              <option value="circle">Circle</option>
              <option value="diamond">Diamond</option>
            </select>
          </div>
          <div class="group">
            <label>Error Correction</label>
            <select id="qr-level">
              <option value="L">Low</option>
              <option value="M">Medium</option>
              <option value="Q">High</option>
              <option value="H" selected>Very High</option>
            </select>
          </div>
        </div>

        <div class="group">
          <label>Size</label>
          <div class="range-box">
            <input type="range" id="size-range" min="180" max="420" step="10" value="240">
            <div class="value-note"><span id="size-value">240</span>px</div>
          </div>
        </div>
      </div>

      <div class="preview-wrap">
        <div class="preview-header">
          <div>
            <h2>Preview</h2>
          </div>
        </div>

        <div class="preview-box">
          <div id="qr-output"></div>
        </div>

        <div class="actions">
          <button class="btn-primary" id="download-btn">Download PNG</button>
          <button class="btn-secondary" id="reset-btn">Reset Style</button>
        </div>
      </div>
    </div>
  </section>
</div>

<script>
const input = document.getElementById('qr-input');
const fgColor = document.getElementById('fg-color');
const bgColor = document.getElementById('bg-color');
const fgLabel = document.getElementById('fg-label');
const bgLabel = document.getElementById('bg-label');
const transCheck = document.getElementById('transparent-bg');
const dotStyle = document.getElementById('dot-style');
const eyeStyle = document.getElementById('eye-style');
const eyeBallStyle = document.getElementById('eye-ball-style');
const qrLevel = document.getElementById('qr-level');
const sizeRange = document.getElementById('size-range');
const sizeValue = document.getElementById('size-value');
const output = document.getElementById('qr-output');
const downloadBtn = document.getElementById('download-btn');
const resetBtn = document.getElementById('reset-btn');

function roundedRect(ctx, x, y, w, h, r) {
  const radius = Math.min(r, w / 2, h / 2);
  ctx.beginPath();
  ctx.moveTo(x + radius, y);
  ctx.arcTo(x + w, y, x + w, y + h, radius);
  ctx.arcTo(x + w, y + h, x, y + h, radius);
  ctx.arcTo(x, y + h, x, y, radius);
  ctx.arcTo(x, y, x + w, y, radius);
  ctx.closePath();
}

function drawDiamond(ctx, x, y, size) {
  const half = size / 2;
  ctx.beginPath();
  ctx.moveTo(x + half, y);
  ctx.lineTo(x + size, y + half);
  ctx.lineTo(x + half, y + size);
  ctx.lineTo(x, y + half);
  ctx.closePath();
  ctx.fill();
}

function drawCircle(ctx, x, y, size) {
  ctx.beginPath();
  ctx.arc(x + size / 2, y + size / 2, size / 2, 0, Math.PI * 2);
  ctx.fill();
}

function drawShape(ctx, style, x, y, size) {
  switch (style) {
    case 'rounded':
      roundedRect(ctx, x, y, size, size, size * 0.28);
      ctx.fill();
      break;
    case 'extra-rounded':
      roundedRect(ctx, x, y, size, size, size * 0.42);
      ctx.fill();
      break;
    case 'circle':
      drawCircle(ctx, x, y, size);
      break;
    case 'diamond':
      drawDiamond(ctx, x, y, size);
      break;
    default:
      ctx.fillRect(x, y, size, size);
  }
}

function inFinder(row, col, count) {
  return (
    (row < 7 && col < 7) ||
    (row < 7 && col >= count - 7) ||
    (row >= count - 7 && col < 7)
  );
}

function shouldSkipForEyeRing(row, col, count) {
  if (!inFinder(row, col, count)) return false;

  const inTopLeftRing = row <= 6 && col <= 6 && !(row >= 1 && row <= 5 && col >= 1 && col <= 5);
  const inTopRightRing = row <= 6 && col >= count - 7 && !(row >= 1 && row <= 5 && col >= count - 6 && col <= count - 2);
  const inBottomLeftRing = row >= count - 7 && col <= 6 && !(row >= count - 6 && row <= count - 2 && col >= 1 && col <= 5);

  return inTopLeftRing || inTopRightRing || inBottomLeftRing;
}

function shouldSkipForEyeBall(row, col, count) {
  return (
    (row >= 2 && row <= 4 && col >= 2 && col <= 4) ||
    (row >= 2 && row <= 4 && col >= count - 5 && col <= count - 3) ||
    (row >= count - 5 && row <= count - 3 && col >= 2 && col <= 4)
  );
}

function drawModule(ctx, style, x, y, size) {
  const full = size + 0.6;
  switch (style) {
    case 'dots':
      drawCircle(ctx, x + size * 0.12, y + size * 0.12, size * 0.76);
      break;
    case 'rounded':
      roundedRect(ctx, x - 0.3, y - 0.3, full, full, size * 0.26);
      ctx.fill();
      break;
    case 'diamond':
      drawDiamond(ctx, x + size * 0.02, y + size * 0.02, size * 0.96);
      break;
    case 'spark':
      roundedRect(ctx, x + size * 0.18, y - 0.2, size * 0.64, full, size * 0.18);
      ctx.fill();
      roundedRect(ctx, x - 0.2, y + size * 0.18, full, size * 0.64, size * 0.18);
      ctx.fill();
      break;
    case 'thin':
      roundedRect(ctx, x + size * 0.14, y + size * 0.14, size * 0.72, size * 0.72, size * 0.12);
      ctx.fill();
      break;
    default:
      ctx.fillRect(x - 0.3, y - 0.3, full, full);
  }
}

function fillEyeHole(ctx, x, y, size, outerStyle, fillColor) {
  ctx.fillStyle = fillColor;
  drawShape(ctx, outerStyle === 'circle' ? 'circle' : outerStyle, x, y, size);
}

function drawEye(ctx, startCol, startRow, cellSize, margin, outerStyle, innerStyle, fg, bgFill) {
  const x = margin + startCol * cellSize;
  const y = margin + startRow * cellSize;

  ctx.fillStyle = fg;
  drawShape(ctx, outerStyle, x, y, cellSize * 7);

  fillEyeHole(ctx, x + cellSize, y + cellSize, cellSize * 5, outerStyle, bgFill);

  ctx.fillStyle = fg;
  drawShape(ctx, innerStyle, x + cellSize * 2, y + cellSize * 2, cellSize * 3);
}

function updateColorLabels() {
  fgLabel.textContent = fgColor.value;
  bgLabel.textContent = bgColor.value;
}

function generateQR() {
  const text = input.value.trim() || ' ';
  const level = qrLevel.value;
  const exportSize = Number(sizeRange.value);
  sizeValue.textContent = exportSize;
  updateColorLabels();

  const qr = qrcode(0, level);
  qr.addData(text);
  qr.make();

  const count = qr.getModuleCount();
  const quietZone = 4;
  const totalCells = count + quietZone * 2;
  const cellSize = exportSize / totalCells;
  const margin = quietZone * cellSize;
  const bgFill = transCheck.checked ? 'rgba(0,0,0,0)' : bgColor.value;

  output.innerHTML = '';
  const canvas = document.createElement('canvas');
  canvas.width = exportSize;
  canvas.height = exportSize;
  const ctx = canvas.getContext('2d', { alpha: true });
  ctx.imageSmoothingEnabled = false;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (!transCheck.checked) {
    ctx.fillStyle = bgColor.value;
    ctx.fillRect(0, 0, exportSize, exportSize);
  }

  ctx.fillStyle = fgColor.value;

  for (let row = 0; row < count; row++) {
    for (let col = 0; col < count; col++) {
      if (!qr.isDark(row, col)) continue;
      if (shouldSkipForEyeRing(row, col, count)) continue;
      if (shouldSkipForEyeBall(row, col, count)) continue;

      const x = margin + col * cellSize;
      const y = margin + row * cellSize;
      drawModule(ctx, dotStyle.value, x, y, cellSize);
    }
  }

  drawEye(ctx, 0, 0, cellSize, margin, eyeStyle.value, eyeBallStyle.value, fgColor.value, bgFill);
  drawEye(ctx, count - 7, 0, cellSize, margin, eyeStyle.value, eyeBallStyle.value, fgColor.value, bgFill);
  drawEye(ctx, 0, count - 7, cellSize, margin, eyeStyle.value, eyeBallStyle.value, fgColor.value, bgFill);

  output.appendChild(canvas);
}

function downloadPNG() {
  const canvas = output.querySelector('canvas');
  if (!canvas) return;
  const link = document.createElement('a');
  link.download = 'qrcode.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}

function resetStyle() {
  input.value = 'https://williammaclean.ca';
  fgColor.value = '#b00b55';
  bgColor.value = '#ffffff';
  transCheck.checked = false;
  dotStyle.value = 'square';
  eyeStyle.value = 'square';
  eyeBallStyle.value = 'square';
  qrLevel.value = 'H';
  sizeRange.value = 240;
  generateQR();
}

[
  input, fgColor, bgColor, transCheck, dotStyle,
  eyeStyle, eyeBallStyle, qrLevel, sizeRange
].forEach(el => {
  el.addEventListener('input', generateQR);
  el.addEventListener('change', generateQR);
});

downloadBtn.addEventListener('click', downloadPNG);
resetBtn.addEventListener('click', resetStyle);

generateQR();
</script>
</body>
</html>
