<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inventory</title>
  <style>
    :root{
      --bg:#050505;
      --panel:#0d0d0d;
      --panel2:#121212;
      --line:rgba(255,255,255,0.08);
      --text:#ffffff;
      --muted:#9a9a9a;
      --accent:#d43b7d;
      --accent2:#ff5c9a;
      --danger:#ff6b6b;
      --warn:#ffcc66;
      --ok:#6ddc91;
      --radius:18px;
      --shadow:0 14px 35px rgba(0,0,0,0.35);
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Inter,Arial,sans-serif;
      background:
        radial-gradient(circle at top, rgba(212,59,125,0.12), transparent 35%),
        var(--bg);
      color:var(--text);
      padding:28px;
    }

    .wrap{
      max-width:1100px;
      margin:0 auto;
    }

    .top{
      margin-bottom:24px;
    }

    .top h1{
      margin:0 0 8px;
      font-size:clamp(2rem,4vw,3.2rem);
      letter-spacing:-0.04em;
    }

    .top p{
      margin:0;
      color:var(--muted);
      font-size:.98rem;
    }

    .add-box{
      background:linear-gradient(180deg,var(--panel2),var(--panel));
      border:1px solid var(--line);
      border-radius:var(--radius);
      padding:18px;
      box-shadow:var(--shadow);
      margin-bottom:20px;
    }

    .add-row{
      display:grid;
      grid-template-columns: 1fr 140px;
      gap:12px;
    }

    input, button{
      border:none;
      outline:none;
      font:inherit;
    }

    input{
      width:100%;
      background:#0a0a0a;
      color:#fff;
      border:1px solid var(--line);
      border-radius:14px;
      padding:14px 16px;
    }

    input::placeholder{color:#777}

    button{
      background:linear-gradient(180deg,var(--accent2),var(--accent));
      color:white;
      font-weight:700;
      border-radius:14px;
      padding:14px 16px;
      cursor:pointer;
      transition:.18s ease;
    }

    button:hover{
      transform:translateY(-1px);
      filter:brightness(1.05);
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:20px;
    }

    .panel{
      background:linear-gradient(180deg,var(--panel2),var(--panel));
      border:1px solid var(--line);
      border-radius:var(--radius);
      padding:18px;
      box-shadow:var(--shadow);
      min-height:420px;
    }

    .panel h2{
      margin:0 0 14px;
      font-size:1.15rem;
      letter-spacing:-0.02em;
    }

    .list{
      display:grid;
      gap:12px;
    }

    .empty{
      color:var(--muted);
      border:1px dashed var(--line);
      border-radius:14px;
      padding:18px;
      text-align:center;
      background:rgba(255,255,255,0.02);
    }

    .item{
      background:rgba(255,255,255,0.03);
      border:1px solid var(--line);
      border-radius:16px;
      padding:14px;
      display:grid;
      gap:12px;
    }

    .item-top{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
    }

    .name{
      font-weight:700;
      font-size:1rem;
      word-break:break-word;
    }

    .sub{
      color:var(--muted);
      font-size:.86rem;
      margin-top:4px;
    }

    .actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .small-btn{
      padding:9px 12px;
      border-radius:12px;
      font-size:.84rem;
      background:#171717;
      border:1px solid var(--line);
      color:#fff;
      font-weight:600;
    }

    .small-btn:hover{
      background:#1f1f1f;
      transform:translateY(-1px);
    }

    .danger{
      background:rgba(255,107,107,0.10);
      border:1px solid rgba(255,107,107,0.28);
      color:#fff;
    }

    .expiry-add{
      display:grid;
      grid-template-columns:1fr auto;
      gap:8px;
    }

    .expiry-list{
      display:grid;
      gap:8px;
    }

    .expiry{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      padding:10px 12px;
      border-radius:12px;
      background:#0a0a0a;
      border:1px solid var(--line);
    }

    .expiry-left{
      display:grid;
      gap:4px;
    }

    .expiry-date{
      font-size:.9rem;
      font-weight:600;
    }

    .expiry-days{
      font-size:.8rem;
      color:var(--muted);
    }

    .badge{
      padding:5px 9px;
      border-radius:999px;
      font-size:.75rem;
      font-weight:700;
      white-space:nowrap;
    }

    .ok{background:rgba(109,220,145,0.14); color:var(--ok);}
    .warn{background:rgba(255,204,102,0.14); color:var(--warn);}
    .bad{background:rgba(255,107,107,0.14); color:var(--danger);}

    @media (max-width: 860px){
      body{padding:16px}
      .grid{grid-template-columns:1fr}
      .add-row{grid-template-columns:1fr}
      .expiry-add{grid-template-columns:1fr}
      .item-top{flex-direction:column}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <h1>Inventory</h1>
      <p>Simple inventory with expiry dates and two clean lists.</p>
    </div>

    <div class="add-box">
      <div class="add-row">
        <input id="itemInput" type="text" placeholder="Add an item..." maxlength="80">
        <button id="addItemBtn">Add Item</button>
      </div>
    </div>

    <div class="grid">
      <div class="panel">
        <h2>What I Have</h2>
        <div id="haveList" class="list"></div>
      </div>

      <div class="panel">
        <h2>Everything</h2>
        <div id="everythingList" class="list"></div>
      </div>
    </div>
  </div>

  <script>
    const haveListEl = document.getElementById("haveList");
    const everythingListEl = document.getElementById("everythingList");
    const itemInput = document.getElementById("itemInput");
    const addItemBtn = document.getElementById("addItemBtn");

    let haveItems = {};
    let everythingItems = [];

    function normalize(name) {
      return String(name || "").trim().toLowerCase().replace(/\s+/g, " ");
    }

    function titleCase(name) {
      return String(name || "")
        .trim()
        .replace(/\s+/g, " ")
        .split(" ")
        .map(word => word.charAt(0).toUpperCase() + word.slice(1))
        .join(" ");
    }

    function addItem() {
      const raw = itemInput.value;
      const key = normalize(raw);
      if (!key) return;

      const display = titleCase(raw);

      if (!haveItems[key]) {
        haveItems[key] = {
          name: display,
          expiries: []
        };
      }

      if (!everythingItems.includes(key)) {
        everythingItems.push(key);
      }

      itemInput.value = "";
      render();
    }

    function removeFromHave(key) {
      delete haveItems[key];
      render();
    }

    function deleteFromEverything(key) {
      delete haveItems[key];
      everythingItems = everythingItems.filter(item => item !== key);
      render();
    }

    function addBackToHave(key) {
      if (!haveItems[key]) {
        haveItems[key] = {
          name: titleCase(key),
          expiries: []
        };
      }
      render();
    }

    function addExpiry(key) {
      const input = document.getElementById(`expiry-input-${cssSafe(key)}`);
      if (!input || !input.value) return;

      haveItems[key].expiries.push(input.value);
      input.value = "";
      render();
    }

    function removeExpiry(key, index) {
      haveItems[key].expiries.splice(index, 1);
      render();
    }

    function daysLeft(dateStr) {
      const now = new Date();
      const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      const parts = dateStr.split("-").map(Number);
      const target = new Date(parts[0], parts[1] - 1, parts[2]);
      return Math.ceil((target - today) / (1000 * 60 * 60 * 24));
    }

    function badgeFor(days) {
      if (days < 0) return { cls: "bad", text: `${Math.abs(days)}d overdue` };
      if (days === 0) return { cls: "bad", text: "today" };
      if (days <= 7) return { cls: "warn", text: `${days}d left` };
      return { cls: "ok", text: `${days}d left` };
    }

    function formatDate(dateStr) {
      const [y, m, d] = dateStr.split("-");
      return `${y}-${m}-${d}`;
    }

    function cssSafe(str) {
      return str.replace(/[^a-z0-9]/gi, "_");
    }

    function renderHave() {
      const keys = Object.keys(haveItems).sort((a, b) =>
        haveItems[a].name.localeCompare(haveItems[b].name)
      );

      if (!keys.length) {
        haveListEl.innerHTML = `<div class="empty">Nothing here yet.</div>`;
        return;
      }

      haveListEl.innerHTML = keys.map(key => {
        const item = haveItems[key];
        const expiryHtml = item.expiries.length
          ? `
            <div class="expiry-list">
              ${item.expiries.map((date, index) => {
                const days = daysLeft(date);
                const badge = badgeFor(days);
                return `
                  <div class="expiry">
                    <div class="expiry-left">
                      <div class="expiry-date">${formatDate(date)}</div>
                      <div class="expiry-days">${days < 0 ? "Expired" : "Expiry countdown"}</div>
                    </div>
                    <div class="actions">
                      <span class="badge ${badge.cls}">${badge.text}</span>
                      <button class="small-btn danger" onclick="removeExpiry('${key}', ${index})">Delete</button>
                    </div>
                  </div>
                `;
              }).join("")}
            </div>
          `
          : `<div class="sub">No expiry dates yet.</div>`;

        return `
          <div class="item">
            <div class="item-top">
              <div>
                <div class="name">${item.name}</div>
              </div>
              <div class="actions">
                <button class="small-btn danger" onclick="removeFromHave('${key}')">Remove</button>
              </div>
            </div>

            <div class="expiry-add">
              <input type="date" id="expiry-input-${cssSafe(key)}">
              <button class="small-btn" onclick="addExpiry('${key}')">Add Date</button>
            </div>

            ${expiryHtml}
          </div>
        `;
      }).join("");
    }

    function renderEverything() {
      const keys = [...everythingItems].sort((a, b) => a.localeCompare(b));

      if (!keys.length) {
        everythingListEl.innerHTML = `<div class="empty">No items yet.</div>`;
        return;
      }

      everythingListEl.innerHTML = keys.map(key => {
        const inHave = !!haveItems[key];
        return `
          <div class="item">
            <div class="item-top">
              <div>
                <div class="name">${titleCase(key)}</div>
                <div class="sub">${inHave ? "Currently in what I have" : "Not currently in what I have"}</div>
              </div>
              <div class="actions">
                ${!inHave ? `<button class="small-btn" onclick="addBackToHave('${key}')">Add Back</button>` : ``}
                <button class="small-btn danger" onclick="deleteFromEverything('${key}')">Delete</button>
              </div>
            </div>
          </div>
        `;
      }).join("");
    }

    function render() {
      renderHave();
      renderEverything();
    }

    addItemBtn.addEventListener("click", addItem);
    itemInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") addItem();
    });

    render();
  </script>
</body>
</html>
