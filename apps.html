<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tools | William MacLean</title>
<link rel="icon" href="logo.png" />
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #000;
  --panel: #050505;
  --text: #fff;
  --muted: #8d8d8d;
  --line: rgba(255,255,255,0.08);
  --accent: #b00b55;
  --header-h: 64px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: "Comfortaa", sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow-x: hidden;
}

header {
  position: fixed;
  inset: 0 0 auto 0;
  height: var(--header-h);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 18px;
  background: rgba(0,0,0,0.72);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(255,255,255,0.05);
  z-index: 100;
}

.logo { display: flex; align-items: center; gap: 10px; }
.logo img { width: 28px; height: 28px; }
.logo span { font-size: 0.95rem; font-weight: 700; }

nav { display: flex; gap: 14px; }
nav a { font-size: 0.84rem; color: #cfcfcf; text-decoration: none; transition: 0.2s; }
nav a:hover { color: #fff; }

.page {
  min-height: 100vh;
  padding-top: var(--header-h);
  display: grid;
  grid-template-columns: 1fr;
}

.left {
  position: relative;
  min-height: 40vh;
  display: flex;
  align-items: flex-end;
}

.left img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: brightness(0.6);
}

.overlay {
  position: relative;
  z-index: 2;
  padding: 30px 20px;
}

.overlay h1 {
  font-size: clamp(2.5rem, 8vw, 4rem);
  line-height: 0.9;
  letter-spacing: -0.04em;
}

.right {
  background: var(--panel);
  padding: 40px 20px;
}

.grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 16px;
  max-width: 800px;
  width: 100%;
}

.tool-card {
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--line);
  padding: 24px;
  text-decoration: none;
  color: inherit;
  transition: all 0.3s ease;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.tool-card:hover {
  border-color: var(--accent);
  background: rgba(176, 11, 85, 0.05);
  transform: translateY(-2px);
}

.tool-card h2 {
  font-size: 1.1rem;
  font-weight: 700;
  color: #fff;
}

.tool-card p {
  font-size: 0.85rem;
  color: var(--muted);
  line-height: 1.4;
}

.tag {
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--accent);
  font-weight: 700;
  margin-bottom: 4px;
}

@media(min-width:900px){
  .page { grid-template-columns: 1fr 1.2fr; }
  .left, .right { height: calc(100vh - var(--header-h)); }
  .right { 
    overflow-y: auto; 
    display: flex;
    justify-content: center;
    align-items: flex-start;
  }
  .grid { grid-template-columns: 1fr 1fr; }
  .overlay { padding: 40px; }
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <img src="logo.png" alt="Logo">
    <span>William MacLean</span>
  </div>

  <nav>
    <a href="index.html">Home</a>
    <a href="tools.html">Tools</a>
    <a href="login.html">Login</a>
  </nav>
</header>

<div class="page">
  <section class="left">
    <img src="me.png" alt="William MacLean">
    <div class="overlay">
      <h1><br>Apps</h1>
    </div>
  </section>

  <section class="right">
    <div class="grid">
      
      <a href="poker.html" class="tool-card">
        <span class="tag">Finance</span>
        <h2>Transactions</h2>
        <p>All the data of my transaction history, since Aug 25, 2025.</p>
      </a>
      
      <a href="poker.html" class="tool-card">
        <span class="tag">Game</span>
        <h2>Poker</h2>
        <p>Simple custom poker games.</p>
      </a>

    </div>
  </section>
</div>

</body>
</html>
