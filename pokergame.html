<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Poker Game | William MacLean</title>
  <link rel="icon" href="logo.png" />
  <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;600;700&display=swap" rel="stylesheet" />

  <style>
    :root{
      --bg:#000;
      --panel:#050505;
      --panel-2:rgba(255,255,255,0.03);
      --text:#fff;
      --muted:#8d8d8d;
      --line:rgba(255,255,255,0.08);
      --accent:#b00b55;
      --accent-soft:rgba(176,11,85,0.16);
      --success:#57d38c;
      --danger:#ff6b81;
      --warning:#ffd166;
      --header-h:64px;
      --max-w:1100px;
      --shadow:0 18px 40px rgba(0,0,0,0.24);
      --card-w:72px;
      --card-h:104px;
      --player-h:68px;
    }

    *{ margin:0; padding:0; box-sizing:border-box; }
    html, body{ min-height:100%; }

    body{
      font-family:"Comfortaa",sans-serif;
      background:var(--bg);
      color:var(--text);
      overflow-x:hidden;
    }

    a{ color:inherit; text-decoration:none; }
    button, input{ font:inherit; }
    img{ display:block; max-width:100%; }

    header{
      position:fixed;
      inset:0 0 auto 0;
      height:var(--header-h);
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 18px;
      background:rgba(0,0,0,0.72);
      backdrop-filter:blur(10px);
      border-bottom:1px solid rgba(255,255,255,0.05);
      z-index:200;
    }

    .logo{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
    }

    .logo img{
      width:28px;
      height:28px;
    }

    .logo span{
      font-size:0.95rem;
      font-weight:700;
      white-space:nowrap;
    }

    nav{
      display:flex;
      align-items:center;
      gap:14px;
      flex-wrap:wrap;
    }

    nav a{
      font-size:0.84rem;
      color:#cfcfcf;
      transition:0.2s;
    }

    nav a:hover{ color:#fff; }

    .status-pill{
      font-size:0.72rem;
      padding:7px 10px;
      border:1px solid rgba(255,255,255,0.1);
      color:#fff;
      background:rgba(255,255,255,0.04);
    }

    .page{
      min-height:100vh;
      padding-top:calc(var(--header-h) + 12px);
    }

    #authGate{
      position:fixed;
      inset:var(--header-h) 0 0 0;
      background:rgba(0,0,0,0.82);
      display:flex;
      align-items:center;
      justify-content:center;
      z-index:150;
      backdrop-filter:blur(8px);
    }

    #authGate.hidden{ display:none; }

    .gate-card{
      border:1px solid var(--line);
      background:rgba(255,255,255,0.03);
      padding:24px 26px;
      color:#d8d8d8;
      font-size:0.92rem;
      text-align:center;
      max-width:420px;
      line-height:1.5;
    }

    .shell{
      width:min(var(--max-w), calc(100% - 24px));
      margin:0 auto;
      padding:0 0 18px;
      display:grid;
      gap:12px;
    }

    .panel{
      border:1px solid var(--line);
      background:var(--panel-2);
      box-shadow:var(--shadow);
    }

    .meta-strip{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      padding:12px 14px;
      flex-wrap:wrap;
    }

    .meta-left,
    .meta-right{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      align-items:center;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      padding:7px 10px;
      border:1px solid rgba(255,255,255,0.1);
      font-size:0.72rem;
      white-space:nowrap;
      background:rgba(255,255,255,0.03);
    }

    .pill.accent{
      border-color:rgba(176,11,85,0.5);
      background:rgba(176,11,85,0.12);
    }

    .pill.success{
      border-color:rgba(87,211,140,0.4);
      background:rgba(87,211,140,0.1);
    }

    .pill.warning{
      border-color:rgba(255,209,102,0.4);
      background:rgba(255,209,102,0.1);
    }

    .layout{
      display:grid;
      grid-template-rows:auto auto auto;
      gap:12px;
      min-height:calc(100vh - var(--header-h) - 48px);
    }

    .players-panel{
      padding:10px;
      max-height:192px;
      overflow:auto;
    }

    .players-list{
      display:grid;
      gap:8px;
    }

    .player{
      min-height:var(--player-h);
      border:1px solid var(--line);
      background:rgba(255,255,255,0.02);
      padding:10px 12px;
      display:grid;
      grid-template-columns:minmax(0,1fr) auto;
      gap:10px;
      align-items:center;
    }

    .player.current-turn{
      border-color:rgba(176,11,85,0.65);
      background:rgba(176,11,85,0.10);
    }

    .player.me{
      box-shadow:inset 0 0 0 1px rgba(255,255,255,0.07);
    }

    .player-main{ min-width:0; }

    .player-name{
      font-size:0.92rem;
      font-weight:700;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      margin-bottom:6px;
    }

    .player-sub{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      color:var(--muted);
      font-size:0.76rem;
      line-height:1.35;
    }

    .center-panel{
      padding:14px 10px 16px;
      display:grid;
      gap:14px;
      align-content:start;
    }

    .board-top{
      display:flex;
      justify-content:center;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      text-align:center;
    }

    .pot-box{
      border:1px solid rgba(176,11,85,0.5);
      background:rgba(176,11,85,0.12);
      padding:10px 14px;
      min-width:130px;
    }

    .pot-label{
      color:var(--muted);
      font-size:0.72rem;
      text-transform:uppercase;
      letter-spacing:0.08em;
      margin-bottom:6px;
    }

    .pot-value{
      font-size:1.3rem;
      font-weight:800;
      letter-spacing:-0.04em;
    }

    .community{
      display:flex;
      justify-content:center;
      gap:8px;
      flex-wrap:nowrap;
      overflow:hidden;
    }

    .card,
    .card-slot{
      width:var(--card-w);
      height:var(--card-h);
      border:1px solid var(--line);
      background:#090909;
      flex:0 0 auto;
    }

    .card img{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .card-slot{
      display:flex;
      align-items:center;
      justify-content:center;
      color:#5e5e5e;
      font-size:0.72rem;
      letter-spacing:0.12em;
    }

    .bottom-panel{
      padding:12px 10px 14px;
      display:grid;
      gap:12px;
      position:sticky;
      bottom:0;
      background:linear-gradient(180deg, rgba(5,5,5,0.95), rgba(5,5,5,1));
      z-index:5;
    }

    .my-cards-wrap{
      display:flex;
      justify-content:center;
      gap:10px;
    }

    .my-cards-wrap .card,
    .my-cards-wrap .card-slot{
      width:84px;
      height:122px;
    }

    .bet-panel{
      border:1px solid var(--line);
      background:rgba(255,255,255,0.02);
      padding:12px;
      display:grid;
      gap:10px;
    }

    .bet-row{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .bet-label{
      color:#fff;
      font-size:0.85rem;
      font-weight:700;
    }

    .bet-value{
      color:var(--accent);
      font-size:0.95rem;
      font-weight:700;
    }

    .bet-controls{
      display:grid;
      grid-template-columns:1fr 110px;
      gap:10px;
      align-items:center;
    }

    input[type="range"]{
      width:100%;
      accent-color:var(--accent);
      cursor:pointer;
    }

    input[type="number"]{
      width:100%;
      min-height:44px;
      border:1px solid var(--line);
      background:#0a0a0a;
      color:#fff;
      padding:10px 12px;
      outline:none;
    }

    .controls{
      display:grid;
      grid-template-columns:repeat(4, 1fr);
      gap:8px;
    }

    .utility-row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
    }

    button{
      width:100%;
      min-height:48px;
      border:1px solid var(--line);
      background:#0a0a0a;
      color:var(--text);
      padding:12px 10px;
      font-weight:700;
      cursor:pointer;
      transition:0.14s ease;
    }

    button:hover{ transform:translateY(-1px); }

    button:disabled{
      opacity:0.5;
      cursor:not-allowed;
      transform:none;
    }

    .primary-btn{
      border-color:rgba(176,11,85,0.75);
      background:rgba(176,11,85,0.16);
    }

    .ghost-btn{
      background:rgba(255,255,255,0.03);
    }

    .danger-btn{
      border-color:rgba(255,107,129,0.45);
      background:rgba(255,107,129,0.10);
    }

    .success-btn{
      border-color:rgba(87,211,140,0.45);
      background:rgba(87,211,140,0.10);
    }

    .status-line{
      min-height:1.2em;
      color:var(--muted);
      font-size:0.85rem;
      text-align:center;
      line-height:1.4;
    }

    .hidden{ display:none !important; }

    @media (min-width: 880px){
      .layout{ grid-template-rows:auto 1fr auto; }
      .players-panel{ max-height:240px; }

      .my-cards-wrap .card,
      .my-cards-wrap .card-slot{
        width:92px;
        height:134px;
      }
    }

    @media (max-width: 560px){
      :root{
        --card-w:60px;
        --card-h:88px;
      }

      header{ padding:0 14px; }

      .logo span{ font-size:0.88rem; }

      nav{ gap:10px; }

      nav a{ font-size:0.78rem; }

      .shell{ width:min(100% - 16px, var(--max-w)); }

      .meta-strip{ padding:10px 12px; }

      .player{ padding:9px 10px; }

      .player-sub{
        gap:8px;
        font-size:0.72rem;
      }

      .community{ gap:6px; }

      .my-cards-wrap .card,
      .my-cards-wrap .card-slot{
        width:76px;
        height:110px;
      }

      .bet-controls{
        grid-template-columns:1fr;
      }

      .controls{
        grid-template-columns:1fr 1fr;
      }

      .utility-row{
        grid-template-columns:1fr;
      }

      button{
        min-height:46px;
        font-size:0.9rem;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <img src="logo.png" alt="Logo" />
      <span>William MacLean</span>
    </div>

    <nav>
      <a href="index">Home</a>
      <a href="poker">Lobby</a>
      <span class="status-pill" id="statusPill">Status: loading</span>
    </nav>
  </header>

  <div id="authGate">
    <div class="gate-card" id="gateCard">Checking access...</div>
  </div>

  <main class="page">
    <section class="shell">
      <section class="panel meta-strip">
        <div class="meta-left">
          <span class="pill" id="gameNamePill">Loading...</span>
          <span class="pill" id="blindsText">Blinds —</span>
          <span class="pill accent" id="turnText">Turn —</span>
        </div>
        <div class="meta-right">
          <span class="pill warning" id="startInfoPill">Waiting...</span>
        </div>
      </section>

      <section class="panel players-panel">
        <div class="players-list" id="playersList">
          <div class="player">
            <div class="player-main">
              <div class="player-name">Loading players...</div>
            </div>
          </div>
        </div>
      </section>

      <section class="panel center-panel">
        <div class="board-top">
          <div class="pot-box">
            <div class="pot-label">Pot</div>
            <div class="pot-value" id="potValue">$0</div>
          </div>
        </div>

        <div class="community" id="communityCards"></div>
      </section>

      <section class="panel bottom-panel">
        <div class="my-cards-wrap" id="myCards"></div>

        <div class="bet-panel">
          <div class="bet-row">
            <div class="bet-label">Bet Size</div>
            <div class="bet-value" id="betSizeText">$0</div>
          </div>
          <div class="bet-controls">
            <input type="range" id="betSlider" min="0" max="100" step="1" value="0" />
            <input type="number" id="betInput" min="0" step="1" value="0" />
          </div>
        </div>

        <div class="controls" id="actionButtons">
          <button type="button" class="ghost-btn" id="checkBtn">Check</button>
          <button type="button" class="primary-btn" id="callBtn">Call</button>
          <button type="button" class="primary-btn" id="betBtn">Bet</button>
          <button type="button" class="danger-btn" id="foldBtn">Fold</button>
        </div>

        <div class="utility-row">
          <button type="button" class="success-btn hidden" id="startBtn">Start Game</button>
          <button type="button" class="ghost-btn" id="leaveBtn">Leave Game</button>
        </div>

        <div class="status-line" id="statusLine">Loading game...</div>
      </section>
    </section>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getAnalytics, isSupported as analyticsSupported } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-analytics.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
    import {
      getFirestore,
      doc,
      getDoc,
      updateDoc,
      onSnapshot,
      serverTimestamp,
      arrayRemove,
      Timestamp
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBLQmCVdVkz_sxxdfvXshDmoe3PeYIUMAY",
      authDomain: "site-78972.firebaseapp.com",
      projectId: "site-78972",
      storageBucket: "site-78972.firebasestorage.app",
      messagingSenderId: "519857042562",
      appId: "1:519857042562:web:64ff26e5f795208081f09b",
      measurementId: "G-TSQ1FNH5W1"
    };

    const app = initializeApp(firebaseConfig);

    if (await analyticsSupported()) {
      getAnalytics(app);
    }

    const auth = getAuth(app);
    const db = getFirestore(app);

    const statusPill = document.getElementById("statusPill");
    const authGate = document.getElementById("authGate");
    const gateCard = document.getElementById("gateCard");

    const gameNamePill = document.getElementById("gameNamePill");
    const blindsText = document.getElementById("blindsText");
    const turnText = document.getElementById("turnText");
    const startInfoPill = document.getElementById("startInfoPill");
    const potValue = document.getElementById("potValue");
    const playersList = document.getElementById("playersList");
    const communityCards = document.getElementById("communityCards");
    const myCards = document.getElementById("myCards");
    const statusLine = document.getElementById("statusLine");

    const checkBtn = document.getElementById("checkBtn");
    const callBtn = document.getElementById("callBtn");
    const betBtn = document.getElementById("betBtn");
    const foldBtn = document.getElementById("foldBtn");
    const leaveBtn = document.getElementById("leaveBtn");
    const startBtn = document.getElementById("startBtn");

    const betSlider = document.getElementById("betSlider");
    const betInput = document.getElementById("betInput");
    const betSizeText = document.getElementById("betSizeText");

    const query = new URLSearchParams(window.location.search);
    const gameId = query.get("game") || "";

    let currentUser = null;
    let currentUserStatus = "default";
    let unsubscribeGame = null;
    let currentGame = null;
    let startCountdownInterval = null;

    const statusRank = {
      default: 0,
      plus: 1,
      me: 2
    };

    function normalizeStatus(status) {
      if (!status) return "default";
      const clean = String(status).trim().toLowerCase();
      return ["default", "plus", "me"].includes(clean) ? clean : "default";
    }

    function setGateMessage(message) {
      gateCard.textContent = message;
    }

    function money(value) {
      return new Intl.NumberFormat("en-CA", {
        style: "currency",
        currency: "CAD",
        maximumFractionDigits: 0
      }).format(Number(value || 0));
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function getPublicName(player, fallback = "Player") {
      const username = String(player?.username || "").trim();
      const displayName = String(player?.displayName || "").trim();
      const email = String(player?.email || "").trim();
      return username || displayName || email || fallback;
    }

    function getUserStatus(uid) {
      return getDoc(doc(db, "users", uid))
        .then(snap => {
          if (!snap.exists()) return "default";
          return normalizeStatus(snap.data()?.status);
        })
        .catch(() => "default");
    }

    function cardUrl(code) {
      if (!code) return "";
      return `/cards/${code}.png`;
    }

    function renderCard(code, hidden = false) {
      if (!code) {
        return `<div class="card-slot"></div>`;
      }

      if (hidden) {
        return `<div class="card-slot">??</div>`;
      }

      return `
        <div class="card">
          <img src="${cardUrl(code)}" alt="${escapeHtml(code)}" />
        </div>
      `;
    }

    function renderCardRow(container, cards, { hidden = false, count = 0 } = {}) {
      const total = Math.max(count, cards?.length || 0);
      const html = [];

      for (let i = 0; i < total; i++) {
        const code = cards?.[i] || "";
        html.push(renderCard(code, hidden && !!code));
      }

      container.innerHTML = html.join("");
    }

    function isCurrentTurn(player, game) {
      const turnSeat = Number(game?.currentTurnSeat ?? game?.turnSeat ?? -1);
      const playerSeat = Number(player?.seat ?? -2);
      return turnSeat >= 0 && playerSeat === turnSeat;
    }

    function findMe(game) {
      if (!currentUser || !Array.isArray(game?.players)) return null;
      return game.players.find(player => player.uid === currentUser.uid) || null;
    }

    function getMyCards(game) {
      const me = findMe(game);
      if (!me) return ["", ""];
      if (Array.isArray(me.cards) && me.cards.length) return me.cards.slice(0, 2);
      if (Array.isArray(game?.holeCards?.[me.uid])) return game.holeCards[me.uid].slice(0, 2);
      return ["", ""];
    }

    function getCommunityCards(game) {
      if (Array.isArray(game?.communityCards)) return game.communityCards.slice(0, 5);
      if (Array.isArray(game?.board)) return game.board.slice(0, 5);
      return [];
    }

    function getPot(game) {
      if (Number.isFinite(Number(game?.pot))) return Number(game.pot);
      if (Number.isFinite(Number(game?.potValue))) return Number(game.potValue);
      return 0;
    }

    function getCallAmount(game, me) {
      const toCall = Number(me?.toCall ?? game?.toCall ?? 0);
      return Number.isFinite(toCall) && toCall > 0 ? toCall : 0;
    }

    function getMinBet(game) {
      const minBet = Number(game?.minRaise ?? game?.bigBlind ?? game?.minBet ?? 0);
      return Number.isFinite(minBet) && minBet > 0 ? minBet : 0;
    }

    function getMaxBet(game, me) {
      const stack = Number(me?.stack ?? 0);
      return Number.isFinite(stack) && stack > 0 ? stack : 0;
    }

    function toMillis(value) {
      if (!value) return 0;
      if (typeof value?.toMillis === "function") return value.toMillis();
      if (typeof value === "number") return value;
      if (typeof value === "string") {
        const parsed = Date.parse(value);
        return Number.isFinite(parsed) ? parsed : 0;
      }
      return 0;
    }

    function isHost(game, uid) {
      if (!game || !uid) return false;
      return game.hostUid === uid || game.createdByUid === uid || game.ownerUid === uid;
    }

    function getPlayerCount(game) {
      return Array.isArray(game?.players) ? game.players.length : 0;
    }

    function getGameStarted(game) {
      const s = String(game?.status || "").toLowerCase();
      return s === "active" || s === "in_progress" || s === "in-progress" || s === "playing" || !!game?.startedAt;
    }

    function clearStartInterval() {
      if (startCountdownInterval) {
        clearInterval(startCountdownInterval);
        startCountdownInterval = null;
      }
    }

    function updateBetControls(game) {
      const me = findMe(game);
      const minBet = getMinBet(game);
      const maxBet = getMaxBet(game, me);
      let currentValue = Number(betInput.value || 0);

      const min = Math.max(0, minBet);
      const max = Math.max(min, maxBet);

      betSlider.min = String(min);
      betSlider.max = String(max);
      betSlider.step = "1";

      betInput.min = String(min);
      betInput.max = String(max);
      betInput.step = "1";

      if (!Number.isFinite(currentValue) || currentValue < min) currentValue = min;
      if (currentValue > max) currentValue = max;

      betSlider.value = String(currentValue);
      betInput.value = String(currentValue);
      betSizeText.textContent = money(currentValue);

      const disabled = !me || max <= 0;
      betSlider.disabled = disabled;
      betInput.disabled = disabled;
    }

    function syncBetFromSlider() {
      const value = Math.max(0, Number(betSlider.value || 0));
      betInput.value = String(value);
      betSizeText.textContent = money(value);
    }

    function syncBetFromInput() {
      const min = Number(betInput.min || 0);
      const max = Number(betInput.max || 0);
      let value = Number(betInput.value || 0);

      if (!Number.isFinite(value)) value = min;
      value = Math.max(min, Math.min(max, value));

      betInput.value = String(value);
      betSlider.value = String(value);
      betSizeText.textContent = money(value);
    }

    function renderPlayers(game) {
      const players = Array.isArray(game?.players) ? [...game.players] : [];
      players.sort((a, b) => Number(a.seat || 999) - Number(b.seat || 999));

      if (!players.length) {
        playersList.innerHTML = `
          <div class="player">
            <div class="player-main">
              <div class="player-name">No players</div>
            </div>
          </div>
        `;
        return;
      }

      playersList.innerHTML = players.map(player => {
        const me = currentUser && player.uid === currentUser.uid;
        const turn = isCurrentTurn(player, game);
        const folded = !!player.folded || player.status === "folded";
        const allIn = !!player.allIn || player.status === "all-in";
        const bet = Number(player.bet || 0);
        const stack = Number(player.stack || 0);

        return `
          <div class="player ${me ? "me" : ""} ${turn ? "current-turn" : ""}">
            <div class="player-main">
              <div class="player-name">${escapeHtml(getPublicName(player))}</div>
              <div class="player-sub">
                <span>Stack ${money(stack)}</span>
                <span>Bet ${money(bet)}</span>
                <span>Seat ${escapeHtml(player.seat ?? "—")}</span>
              </div>
            </div>
            <div>
              ${turn ? '<span class="pill accent">Turn</span>' : ""}
              ${allIn ? '<span class="pill warning">All In</span>' : ""}
              ${folded ? '<span class="pill">Folded</span>' : ""}
              ${me ? '<span class="pill success">You</span>' : ""}
            </div>
          </div>
        `;
      }).join("");
    }

    function updateStartDisplay(game) {
      clearStartInterval();

      const started = getGameStarted(game);
      const host = isHost(game, currentUser?.uid);
      const count = getPlayerCount(game);
      const autoStartAtMs = toMillis(game?.autoStartAt);

      startBtn.classList.toggle("hidden", !(host && !started && count >= 2));
      startBtn.disabled = !(host && !started && count >= 2);

      if (started) {
        startInfoPill.textContent = "Started";
        startInfoPill.className = "pill success";
        return;
      }

      if (count < 2) {
        startInfoPill.textContent = "Need 2 players";
        startInfoPill.className = "pill warning";
        return;
      }

      if (!autoStartAtMs) {
        startInfoPill.textContent = host ? "Ready to start" : "Waiting to start";
        startInfoPill.className = "pill accent";
        return;
      }

      const tick = () => {
        const diff = autoStartAtMs - Date.now();

        if (diff <= 0) {
          startInfoPill.textContent = "Starting...";
          startInfoPill.className = "pill success";
          clearStartInterval();
          return;
        }

        const seconds = Math.ceil(diff / 1000);
        startInfoPill.textContent = `Starts in ${seconds}s`;
        startInfoPill.className = "pill warning";
      };

      tick();
      startCountdownInterval = setInterval(tick, 500);
    }

    async function ensureAutoStart(game) {
      try {
        if (!currentUser || !game) return;
        if (!isHost(game, currentUser.uid)) return;
        if (getGameStarted(game)) return;

        const players = getPlayerCount(game);

        if (players >= 2) {
          const autoStartAtMs = toMillis(game?.autoStartAt);
          if (!autoStartAtMs) {
            await updateDoc(doc(db, "pokerGames", gameId), {
              autoStartAt: Timestamp.fromMillis(Date.now() + 60000),
              updatedAt: serverTimestamp()
            });
          } else if (autoStartAtMs <= Date.now()) {
            await startGame("auto");
          }
        } else if (toMillis(game?.autoStartAt)) {
          await updateDoc(doc(db, "pokerGames", gameId), {
            autoStartAt: null,
            updatedAt: serverTimestamp()
          });
        }
      } catch (error) {
        console.error("ensureAutoStart error", error);
      }
    }

    function renderGame(game) {
      currentGame = game;

      const me = findMe(game);
      const community = getCommunityCards(game);
      const myHoleCards = getMyCards(game);

      gameNamePill.textContent = game?.name || "Poker";
      blindsText.textContent = `Blinds ${money(game?.smallBlind || 0)} / ${money(game?.bigBlind || 0)}`;

      const turnPlayer = Array.isArray(game?.players)
        ? game.players.find(player => isCurrentTurn(player, game))
        : null;

      turnText.textContent = `Turn ${turnPlayer ? getPublicName(turnPlayer) : "—"}`;
      potValue.textContent = money(getPot(game));

      renderPlayers(game);
      renderCardRow(communityCards, community, { count: 5 });
      renderCardRow(myCards, myHoleCards, { count: 2 });
      updateBetControls(game);
      updateStartDisplay(game);

      const started = getGameStarted(game);
      const itIsMyTurn = !!me && isCurrentTurn(me, game);
      const myFolded = !!me?.folded || me?.status === "folded";
      const handDone = ["finished", "ended", "complete"].includes(String(game?.status || "").toLowerCase());

      const callAmount = getCallAmount(game, me);
      const minBet = getMinBet(game);

      checkBtn.textContent = "Check";
      callBtn.textContent = callAmount > 0 ? `Call ${money(callAmount)}` : "Call";
      betBtn.textContent = minBet > 0 ? `Bet ${money(Number(betInput.value || minBet))}` : "Bet";

      const disableActions = !started || !itIsMyTurn || myFolded || handDone;

      checkBtn.disabled = disableActions;
      callBtn.disabled = disableActions;
      betBtn.disabled = disableActions;
      foldBtn.disabled = disableActions;

      if (!me) {
        statusLine.textContent = "You are not in this game.";
      } else if (!started) {
        statusLine.textContent = getPlayerCount(game) < 2
          ? "Waiting for another player."
          : (isHost(game, currentUser?.uid) ? "You can start now or wait for auto-start." : "Waiting for host or auto-start.");
      } else if (handDone) {
        statusLine.textContent = "Hand finished.";
      } else if (myFolded) {
        statusLine.textContent = "You folded.";
      } else if (itIsMyTurn) {
        statusLine.textContent = "Your turn.";
      } else {
        statusLine.textContent = turnPlayer ? `${getPublicName(turnPlayer)} to act.` : "Waiting...";
      }
    }

    async function startGame(source = "manual") {
      if (!currentUser || !currentGame) return;
      if (!isHost(currentGame, currentUser.uid)) return;
      if (getPlayerCount(currentGame) < 2) {
        statusLine.textContent = "Need at least 2 players.";
        return;
      }

      try {
        statusLine.textContent = "Starting game...";
        await updateDoc(doc(db, "pokerGames", gameId), {
          status: "active",
          startedAt: serverTimestamp(),
          autoStartAt: null,
          startedByUid: currentUser.uid,
          startSource: source,
          updatedAt: serverTimestamp()
        });
      } catch (error) {
        console.error(error);
        statusLine.textContent = "Could not start game.";
      }
    }

    async function act(type) {
      if (!currentUser || !currentGame) return;
      const me = findMe(currentGame);
      if (!me) return;

      const amount = Math.max(0, Number(betInput.value || 0));

      statusLine.textContent = `${type}...`;

      try {
        const payload = {
          lastActionType: type,
          lastActionByUid: currentUser.uid,
          updatedAt: serverTimestamp()
        };

        if (type === "bet") {
          payload.lastBetAmount = amount;
        }

        await updateDoc(doc(db, "pokerGames", gameId), payload);
      } catch (error) {
        console.error(error);
        statusLine.textContent = "Could not send action.";
      }
    }

    async function leaveGame() {
      if (!currentUser || !currentGame) return;

      const confirmed = window.confirm("Leave this game?");
      if (!confirmed) return;

      const me = findMe(currentGame);
      if (!me) {
        window.location.href = "poker";
        return;
      }

      try {
        await updateDoc(doc(db, "pokerGames", gameId), {
          players: arrayRemove(me),
          updatedAt: serverTimestamp()
        });
        window.location.href = "poker";
      } catch (error) {
        console.error(error);
        statusLine.textContent = "Could not leave game.";
      }
    }

    function watchGame() {
      if (!gameId) {
        setGateMessage("No game id.");
        statusLine.textContent = "Missing game id.";
        return;
      }

      if (unsubscribeGame) unsubscribeGame();

      unsubscribeGame = onSnapshot(doc(db, "pokerGames", gameId), async (snap) => {
        if (!snap.exists()) {
          statusLine.textContent = "Game not found.";
          gameNamePill.textContent = "Game not found";
          return;
        }

        const game = { id: snap.id, ...snap.data() };
        authGate.classList.add("hidden");
        renderGame(game);
        await ensureAutoStart(game);
      }, (error) => {
        console.error(error);
        statusLine.textContent = "Could not load game.";
      });
    }

    onAuthStateChanged(auth, async (user) => {
      currentUser = user;

      if (!user) {
        statusPill.textContent = "Status: signed out";
        setGateMessage("Please sign in to use Poker.");
        return;
      }

      currentUserStatus = await getUserStatus(user.uid);
      statusPill.textContent = `Status: ${currentUserStatus}`;

      if ((statusRank[currentUserStatus] ?? 0) < statusRank.plus) {
        setGateMessage("Poker is for plus and me.");
        return;
      }

      setGateMessage("Loading game...");
      watchGame();
    });

    betSlider.addEventListener("input", () => {
      syncBetFromSlider();
      const currentValue = Number(betInput.value || 0);
      betBtn.textContent = currentValue > 0 ? `Bet ${money(currentValue)}` : "Bet";
    });

    betInput.addEventListener("input", () => {
      syncBetFromInput();
      const currentValue = Number(betInput.value || 0);
      betBtn.textContent = currentValue > 0 ? `Bet ${money(currentValue)}` : "Bet";
    });

    checkBtn.addEventListener("click", () => act("check"));
    callBtn.addEventListener("click", () => act("call"));
    betBtn.addEventListener("click", () => act("bet"));
    foldBtn.addEventListener("click", () => act("fold"));
    leaveBtn.addEventListener("click", leaveGame);
    startBtn.addEventListener("click", () => startGame("manual"));

    window.addEventListener("beforeunload", clearStartInterval);
  </script>
</body>
</html>
