<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#000;
  --text:#fff;
  --accent:#b00b55;
  --line:rgba(255,255,255,0.1);
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:"Comfortaa",sans-serif;
  background:var(--bg);
  color:var(--text);
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.container{
  width:100%;
  max-width:320px;
}

input{
  width:100%;
  height:44px;
  margin-bottom:10px;
  background:transparent;
  border:1px solid var(--line);
  color:#fff;
  padding:0 10px;
  font-family:inherit;
}

button{
  width:100%;
  height:44px;
  background:var(--accent);
  border:none;
  color:#fff;
  font-family:inherit;
  margin-bottom:8px;
  cursor:pointer;
}

button.secondary{
  background:transparent;
  border:1px solid var(--line);
}

.hidden{display:none}

</style>
</head>
<body>

<div class="container">
  <form id="form">
    <input id="email" type="email" placeholder="email" required>
    <input id="password" type="password" placeholder="password" required>
    <button type="submit" id="submit">login</button>
  </form>

  <button id="toggle" class="secondary">create account</button>
  <button id="logout" class="secondary">logout</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
import {
  getFirestore,
  doc,
  getDoc,
  setDoc
} from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBLQmCVdVkz_sxxdfvXshDmoe3PeYIUMAY",
  authDomain: "site-78972.firebaseapp.com",
  projectId: "site-78972",
  storageBucket: "site-78972.firebasestorage.app",
  messagingSenderId: "519857042562",
  appId: "1:519857042562:web:64ff26e5f795208081f09b"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const form = document.getElementById("form");
const email = document.getElementById("email");
const password = document.getElementById("password");
const submit = document.getElementById("submit");
const toggle = document.getElementById("toggle");
const logoutBtn = document.getElementById("logout");

let mode = "login";

function setMode(){
  if(mode === "login"){
    mode = "signup";
    submit.textContent = "create";
    toggle.textContent = "login";
  }else{
    mode = "login";
    submit.textContent = "login";
    toggle.textContent = "create account";
  }
}

toggle.onclick = setMode;

form.onsubmit = async (e)=>{
  e.preventDefault();

  if(mode === "login"){
    await signInWithEmailAndPassword(auth, email.value, password.value);
  }else{
    const cred = await createUserWithEmailAndPassword(auth, email.value, password.value);

    await setDoc(doc(db, "users", cred.user.uid), {
      status: "default"
    });
  }
};

logoutBtn.onclick = ()=> signOut(auth);

onAuthStateChanged(auth, async (user)=>{
  if(!user) return;

  const snap = await getDoc(doc(db, "users", user.uid));
  const data = snap.data();

  if(data?.status === "plus"){
    document.body.style.background = "#111";
  }
});
</script>

</body>
</html>
