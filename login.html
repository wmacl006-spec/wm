<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#000;
  --panel:#0a0a0a;
  --text:#fff;
  --accent:#b00b55;
  --line:rgba(255,255,255,0.1);
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:"Comfortaa",sans-serif;
  background:var(--bg);
  color:var(--text);
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.wrapper{
  width:100%;
  max-width:380px;
  padding:20px;
}

.box{
  border:1px solid var(--line);
  padding:20px;
}

h1{
  font-size:1.2rem;
  margin-bottom:16px;
  font-weight:600;
}

input{
  width:100%;
  height:46px;
  margin-bottom:12px;
  background:transparent;
  border:1px solid var(--line);
  color:#fff;
  padding:0 12px;
  font-family:inherit;
}

input:focus{
  outline:none;
  border-color:var(--accent);
}

button{
  width:100%;
  height:46px;
  background:var(--accent);
  border:none;
  color:#fff;
  font-family:inherit;
  cursor:pointer;
  margin-bottom:10px;
}

.row{
  display:flex;
  justify-content:space-between;
  gap:10px;
}

.row button{
  flex:1;
  background:transparent;
  border:1px solid var(--line);
}

.status{
  margin-top:14px;
  font-size:0.8rem;
  color:#aaa;
}

.plus{
  margin-top:16px;
  padding-top:12px;
  border-top:1px solid var(--line);
  font-size:0.85rem;
}

.hidden{display:none}

</style>
</head>
<body>

<div class="wrapper">
  <div class="box">
    <h1 id="title">Login</h1>

    <form id="form">
      <input id="email" type="email" placeholder="email" required>
      <input id="password" type="password" placeholder="password" required>
      <button type="submit" id="submit">login</button>
    </form>

    <div class="row">
      <button id="toggle">create</button>
      <button id="logout">logout</button>
    </div>

    <div class="status" id="status">not signed in</div>

    <div class="plus hidden" id="plus">
      plus content unlocked
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
import {
  getFirestore,
  doc,
  getDoc,
  setDoc
} from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBLQmCVdVkz_sxxdfvXshDmoe3PeYIUMAY",
  authDomain: "site-78972.firebaseapp.com",
  projectId: "site-78972",
  storageBucket: "site-78972.firebasestorage.app",
  messagingSenderId: "519857042562",
  appId: "1:519857042562:web:64ff26e5f795208081f09b"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const form = document.getElementById("form");
const email = document.getElementById("email");
const password = document.getElementById("password");
const submit = document.getElementById("submit");
const toggle = document.getElementById("toggle");
const logoutBtn = document.getElementById("logout");
const statusEl = document.getElementById("status");
const plusEl = document.getElementById("plus");
const title = document.getElementById("title");

let mode = "login";

function switchMode(){
  if(mode === "login"){
    mode = "signup";
    submit.textContent = "create";
    title.textContent = "Create";
    toggle.textContent = "login";
  }else{
    mode = "login";
    submit.textContent = "login";
    title.textContent = "Login";
    toggle.textContent = "create";
  }
}

toggle.onclick = switchMode;

form.onsubmit = async (e)=>{
  e.preventDefault();

  if(mode === "login"){
    await signInWithEmailAndPassword(auth, email.value, password.value);
  }else{
    const cred = await createUserWithEmailAndPassword(auth, email.value, password.value);

    await setDoc(doc(db, "users", cred.user.uid), {
      status: "default"
    });
  }
};

logoutBtn.onclick = ()=> signOut(auth);

onAuthStateChanged(auth, async (user)=>{
  if(!user){
    statusEl.textContent = "not signed in";
    plusEl.classList.add("hidden");
    return;
  }

  statusEl.textContent = user.email;

  const snap = await getDoc(doc(db, "users", user.uid));
  const data = snap.data();

  if(data?.status === "plus"){
    plusEl.classList.remove("hidden");
  }else{
    plusEl.classList.add("hidden");
  }
});
</script>

</body>
</html>
